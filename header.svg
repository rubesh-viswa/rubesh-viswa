<svg xmlns="http://www.w3.org/2000/svg" width="900" height="180" viewBox="0 0 900 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a87c;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#c9a87c"/>
      <stop offset="80%" style="stop-color:#c9a87c"/>
      <stop offset="100%" style="stop-color:#c9a87c;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="url(#bg)" rx="6"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="898" height="178" fill="none" stroke="#c9a87c" stroke-opacity="0.12" rx="6"/>

  <!-- Name -->
  <text x="450" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="url(#nameGrad)" text-anchor="middle" font-weight="400" letter-spacing="3">
    Rubesh Viswanathan
  </text>

  <!-- Accent line -->
  <rect x="320" y="98" width="260" height="1" fill="url(#accent)"/>

  <!-- Title -->
  <text x="450" y="128" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#c9a87c" text-anchor="middle" letter-spacing="4" font-weight="300">
    SENIOR SOFTWARE ENGINEER
  </text>
</svg>
